<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Style Sayt</title>

<style>
body {
    margin: 0;
    font-family: 'Courier New', monospace;
    background: #87CEEB;
}

/* Header */
header {
    background: #3b7a2a;
    padding: 15px;
    text-align: center;
    color: white;
    font-size: 24px;
    border-bottom: 5px solid #2d5a1f;
}

/* Block style */
.block {
    background: #6cc24a;
    border: 5px solid #3b7a2a;
    margin: 20px;
    padding: 20px;
    box-shadow: inset -5px -5px 0 #2d5a1f;
}

/* Button */
.btn {
    background: #c2b280;
    border: 4px solid #8b7d5a;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: bold;
}
.btn:hover {
    background: #a89b6b;
}

/* Pixel grass effect */
.grass {
    height: 50px;
    background: linear-gradient(
        to bottom,
        #3b7a2a 50%,
        #6b3e1f 50%
    );
}

/* Footer */
footer {
    background: #3b7a2a;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>
<body>

<header>
    🟩 Minecraft Saytim
</header>

<div class="grass"></div>

<div class="block">
    <h2>👋 Salom!</h2>
    <p>Bu mening Minecraft uslubidagi saytım.</p>
    <button class="btn" onclick="alert('Xush kelibsiz!')">Bos meni</button>
</div>

<div class="block">
    <h2>🧱 Loyihalar</h2>
    <p>• Minecraft o‘yin yaratish</p>
    <p>• YouTube kanal</p>
</div>

<div class="block">
    <h2>📩 Aloqa</h2>
    <p>Telegram: @username</p>
</div>

<footer>
    © 2026 Minecraft Style
</footer>

</body>
</html>
